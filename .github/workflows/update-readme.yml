name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README sections
        uses: actions/github-script@v7
        env:
          PROFILE_USERNAME: ${{ github.repository_owner }}
        with:
          script: |
            const fs = require('fs')
            const readmePath = 'README.md'
            const username = process.env.PROFILE_USERNAME

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username,
              sort: 'updated',
              per_page: 100,
            })

            const recentRepos = repos
              .filter((repo) => !repo.fork && repo.name.toLowerCase() !== username.toLowerCase())
              .slice(0, 5)

            const projectsMarkdown = recentRepos.length
              ? recentRepos
                  .map((repo) => {
                    const description = repo.description ? ` — ${repo.description}` : ''
                    return `- [${repo.name}](${repo.html_url})${description}`
                  })
                  .join('\n')
              : '_No recent projects found._'

            const events = await github.rest.activity.listPublicEventsForUser({
              username,
              per_page: 10,
            })

            const activityMarkdown = events.data.length
              ? events.data
                  .map((event) => {
                    const repoName = event.repo?.name || 'unknown repository'
                    const eventType = event.type.replace(/Event$/, '')
                    return `- ${eventType} in [${repoName}](https://github.com/${repoName})`
                  })
                  .join('\n')
              : '_No recent activity found._'

            const readme = fs.readFileSync(readmePath, 'utf8')

            const replaceSection = (content, startMarker, endMarker, sectionBody) => {
              const pattern = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`)
              return content.replace(pattern, `${startMarker}\n${sectionBody}\n${endMarker}`)
            }

            let updated = readme
            updated = replaceSection(
              updated,
              '<!--START_SECTION:recent_projects-->',
              '<!--END_SECTION:recent_projects-->',
              projectsMarkdown,
            )
            updated = replaceSection(
              updated,
              '<!--START_SECTION:recent_activity-->',
              '<!--END_SECTION:recent_activity-->',
              activityMarkdown,
            )

            if (updated !== readme) {
              fs.writeFileSync(readmePath, updated)
              core.info('README updated successfully.')
            } else {
              core.info('README is already up to date.')
            }

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README recent projects and activity"
          git push
